name: Tests

on:
  pull_request:
    branches:
      - main
    paths:
      - "luckygym/**"
      - "tests/**"
      - "example.py"
      - ".github/**"
      - "pyproject.toml"
  push:
    branches:
      - main
    paths:
      - "luckygym/**"
      - "tests/**"
      - "example.py"
      - ".github/**"
      - "pyproject.toml"

jobs:
  pytest:
    name: Pytest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Test with pytest
        run: uv run pytest tests -v --cov=./luckygym --durations=0
